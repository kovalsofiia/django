{% extends "base.html" %}

{% block title %}Вхід{% endblock %}

{% block content %}
    <h1>Вхід у систему</h1>

    {% if form.errors %}
        <p>Неправильний логін або пароль. Спробуйте ще раз.</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Увійти</button>
    </form>
{% endblock %}
